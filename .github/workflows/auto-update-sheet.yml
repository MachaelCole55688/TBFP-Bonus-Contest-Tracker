name: Auto Update Bonus Contest Site

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: auto-update-bonus-contest-site
  cancel-in-progress: true

jobs:
  update-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest contests from Google Sheet
        run: node update_site_data.js

      - name: Commit updated HTML
        run: |
          if git diff --quiet; then
            echo "No site changes found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto update contest data"
          git push
